    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }

    }

    }
    .btn-primary:active {

    }
    
    .btn-secondary {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    
    .input-field {
      border: 1.5px solid #e2e8f0;
      background: #ffffff;
      transition: all 0.2s ease;
      border-radius: 12px;
    }
    .input-field:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
      outline: none;
    }
    
    .focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
    }
    
    .nav-item {
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .nav-item.active {
      background: #f8fafc;
      border-left-color: #0f172a;
      color: #0f172a;
      font-weight: 600;
    }
    .nav-item:not(.active):hover {
      background: #f8fafc;
      color: #334155;
    }
    
    .status-pulse {
      position: relative;
    }
    .status-pulse::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: inherit;
      opacity: 0.2;
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    
    .table-row {
      transition: background-color 0.15s ease;
    }
    .table-row:hover {
      background: #f8fafc;
    }
    
    .modal-backdrop {
      background: rgba(15, 23, 42, 0.5);

    }
    
    .drawer-overlay {
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(2px);
    }

    function navigate(path) {
      window.location.hash = path;
    }

    function getRoute() {
      const hash = window.location.hash.slice(1) || '/';
      return hash;
    }

    function parseRoute(route) {
      const parts = route.split('/').filter(Boolean);
      return {
        path: '/' + parts.join('/'),
        params: parts
      };
    }

    window.addEventListener('hashchange', () => {
      const { path, params } = parseRoute(getRoute());
      state.route = path;
      state.routeParams = params;
      if (state.currentView === 'dashboard') {
        render();
      }
    });

          { id: '/projects', icon: 'folder', label: 'Projects' },
          { id: '/databases', icon: 'database', label: 'Databases' },
          { id: '/domains', icon: 'globe', label: 'Domains' },
          { id: '/settings/profile', icon: 'settings', label: 'Settings' }
        ];
        
        return navItems.map(item => `
          <button onclick="navigate('${item.id}')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 text-sm ${state.route === item.id ? 'active' : ''}">

        return navItems.map(item => `

    function renderCurrentPage() {
      const route = state.route;
      const params = state.routeParams;
      const isSuperAdmin = state.currentRole === 'super_admin';

      if (route === '/') return isSuperAdmin ? renderAdminDashboard() : renderClientDashboard();
      if (route === '/clients') return renderClientsPage();
      if (route === '/projects') return renderProjectsPage();
      if (route === '/databases') return renderDatabasesPage();
      if (route === '/domains') return renderDomainsPage();
      
      if (params[0] === 'clients' && params[1]) return renderClientDetailPage(params[1]);
      if (params[0] === 'projects' && params[1]) return renderProjectDetailPage(params[1]);
      if (params[0] === 'databases' && params[1]) return renderDatabaseDetailPage(params[1]);
      if (params[0] === 'domains' && params[1] === 'manage' && params[2]) return renderManageDNSPage(params[2]);
      
      if (params[0] === 'settings') {
        const section = params[1] || 'profile';
        return renderSettingsPage(section);
      }

      return renderAdminDashboard();
    }

    // ============================================
    // MODALS
    // ============================================
    function renderModals() {
      if (!state.activeModal) return '';
      const modals = {
        'add-client': renderAddClientModal,
        'edit-client': renderEditClientModal,
        'create-project': renderCreateProjectModal,
        'add-domain': renderAddDomainModal
      };
      const renderer = modals[state.activeModal];
      if (!renderer) return '';
      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeModal(event)">
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg animate-scale-in" onclick="event.stopPropagation()">
            ${renderer()}
          </div>
        </div>
      `;
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================
    function initLoginEvents() {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmail').value;
          performLogin(detectRoleByEmail(email));
        });
      }
    }

    function quickLogin(email) {
      performLogin(detectRoleByEmail(email));
    }

    function performLogin(role) {
      state.currentView = 'dashboard';
      state.currentRole = role;
      const { path } = parseRoute(getRoute());
      state.route = path === '/' ? '/' : path;
      state.routeParams = parseRoute(getRoute()).params;
      if (state.route === '/' || !state.route) {
        navigate(role === 'super_admin' ? '/' : '/');
      }
      render();
    }

    function initDashboardInteractions() {}

    function logout() {
      state.currentView = 'login';
      state.currentRole = null;
      state.route = '';
      state.routeParams = {};
      state.notificationsOpen = false;
      state.mobileSidebarOpen = false;
      window.location.hash = '';
      render();
    }

    function toggleMobileSidebar() {
      state.mobileSidebarOpen = !state.mobileSidebarOpen;
      render();
    }

    function toggleNotifications() {
      state.notificationsOpen = !state.notificationsOpen;
      render();
    }

    function openModal(modalType, itemId = null) {
      state.activeModal = modalType;
      state.selectedItem = itemId;
      state.notificationsOpen = false;
      render();
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      state.activeModal = null;
      state.selectedItem = null;
      render();
    }

    document.addEventListener('click', (e) => {
      if (state.notificationsOpen && !e.target.closest('.relative')) {
        state.notificationsOpen = false;
        render();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.activeModal) closeModal();
        if (state.mobileSidebarOpen) {
          state.mobileSidebarOpen = false;
          render();
        }
      }
    });

    // ============================================
    // API FETCH
    // ============================================
    fetch("https://api.luviio.com")
      .then(response => response.json())
      .then(data => {
        document.getElementById("clients").innerHTML = data
          .map(client => `<div>${client.name}</div>`)
          .join("");
      });

    // Initial render
    render();
  </script>
