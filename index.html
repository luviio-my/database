<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudStack - Infrastructure Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    
    body {
      background: #ffffff;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInRight 0.3s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-spin { animation: spin 1s linear infinite; }
    
    .stagger-1 { animation-delay: 0.05s; opacity: 0; }
    .stagger-2 { animation-delay: 0.1s; opacity: 0; }
    .stagger-3 { animation-delay: 0.15s; opacity: 0; }
    .stagger-4 { animation-delay: 0.2s; opacity: 0; }
    .stagger-5 { animation-delay: 0.25s; opacity: 0; }
    .stagger-6 { animation-delay: 0.3s; opacity: 0; }
    
    .card {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .card-hover:hover {
      border-color: #e2e8f0;
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.06);
      transform: translateY(-1px);
    }
    
    .btn-primary {
      background: #0f172a;
      color: #ffffff;
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      background: #1e293b;
      box-shadow: 0 4px 16px -2px rgba(15, 23, 42, 0.2);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }
    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn-secondary {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    
    .input-field {
      border: 1.5px solid #e2e8f0;
      background: #ffffff;
      transition: all 0.2s ease;
      border-radius: 12px;
    }
    .input-field:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
      outline: none;
    }
    
    .nav-item {
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .nav-item.active {
      background: #f8fafc;
      border-left-color: #0f172a;
      color: #0f172a;
      font-weight: 600;
    }
    .nav-item:not(.active):hover {
      background: #f8fafc;
      color: #334155;
    }
    
    .status-pulse {
      position: relative;
    }
    .status-pulse::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: inherit;
      opacity: 0.2;
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    
    .table-row {
      transition: background-color 0.15s ease;
    }
    .table-row:hover {
      background: #f8fafc;
    }
    
    .modal-backdrop {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(4px);
    }
    
    .drawer-overlay {
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(2px);
    }
    
    .progress-bar {
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .breadcrumb-link {
      color: #64748b;
      transition: color 0.15s ease;
    }
    .breadcrumb-link:hover {
      color: #0f172a;
    }
    
    .settings-nav-item {
      transition: all 0.15s ease;
      border-left: 2px solid transparent;
    }
    .settings-nav-item.active {
      background: #f8fafc;
      border-left-color: #0f172a;
      color: #0f172a;
      font-weight: 600;
    }
    .settings-nav-item:not(.active):hover {
      background: #f8fafc;
      color: #334155;
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    
    .skeleton-text {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 14px;
    }
    
    .skeleton-circle {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 50%;
    }
    
    .toast-enter {
      animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .toast-exit {
      animation: fadeIn 0.2s ease reverse forwards;
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    .chart-bar {
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      background: #0f172a;
      border-radius: 6px 6px 0 0;
    }
  </style>
</head>
<body class="min-h-screen antialiased">
  <div id="app"></div>

  <script>
    // ============================================
    // API ENDPOINT
    // ============================================
    const API_URL = "https://api.luviio.com";

    // ============================================
    // APP STATE
    // ============================================
    const state = {
      currentView: 'login',
      currentRole: null,
      route: '',
      routeParams: {},
      sidebarOpen: true,
      mobileSidebarOpen: false,
      notificationsOpen: false,
      profileDropdownOpen: false,
      activeModal: null,
      selectedItem: null,
      searchQuery: '',
      // Live data from API
      data: null,
      loading: false,
      error: null,
      toasts: []
    };

    // ============================================
    // USER CONTEXT
    // ============================================
    const users = {
      super_admin: { id: 1, name: 'Sarah Chen', email: 'sarah@cloudstack.io', role: 'super_admin', company: 'CloudStack' },
      client_user: { id: 2, name: 'Michael Torres', email: 'michael@acmecorp.com', role: 'client_user', company: 'Acme Corp' }
    };

    // ============================================
    // DATA ACCESS LAYER
    // ============================================
    function getData(key) {
      if (!state.data) return [];
      const val = state.data[key];
      if (Array.isArray(val)) return val;
      return [];
    }

    function findItem(key, id) {
      return getData(key).find(item => String(item.id) === String(id));
    }

    function filterBy(key, field, value) {
      return getData(key).filter(item => String(item[field]) === String(value));
    }

    function getUser() {
      return state.currentRole === 'super_admin' ? users.super_admin : users.client_user;
    }

    // ============================================
    // API FETCH
    // ============================================
    async function fetchAPI() {
      state.loading = true;
      state.error = null;
      render();

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        const data = await response.json();
        state.data = normalizeData(data);
        state.loading = false;
        state.error = null;
        render();
        return data;
      } catch (err) {
        state.loading = false;
        state.error = err.message;
        render();
        showToast('Failed to load data: ' + err.message, 'error');
        return null;
      }
    }

    function normalizeData(raw) {
      if (Array.isArray(raw)) {
        return { clients: raw, projects: [], databases: [], domains: [], activities: [], notifications: [] };
      }
      if (raw && typeof raw === 'object') {
        return {
          clients: raw.clients || raw.data || [],
          projects: raw.projects || [],
          databases: raw.databases || [],
          domains: raw.domains || [],
          activities: raw.activities || [],
          notifications: raw.notifications || []
        };
      }
      return { clients: [], projects: [], databases: [], domains: [], activities: [], notifications: [] };
    }

    // ============================================
    // ROUTER
    // ============================================
    function navigate(path) {
      window.location.hash = path;
    }

    function getRoute() {
      return window.location.hash.slice(1) || '/';
    }

    function parseRoute(route) {
      const parts = route.split('/').filter(Boolean);
      return { path: '/' + parts.join('/'), params: parts };
    }

    window.addEventListener('hashchange', () => {
      const { path, params } = parseRoute(getRoute());
      state.route = path;
      state.routeParams = params;
      state.mobileSidebarOpen = false;
      state.notificationsOpen = false;
      if (state.currentView === 'dashboard') render();
    });

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    function getStatusColor(status) {
      if (!status) return 'bg-slate-100 text-slate-600 border-slate-200';
      const s = status.toLowerCase();
      const colors = {
        active: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        running: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        configured: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        online: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        live: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        development: 'bg-blue-50 text-blue-700 border-blue-200',
        dev: 'bg-blue-50 text-blue-700 border-blue-200',
        pending: 'bg-amber-50 text-amber-700 border-amber-200',
        waiting: 'bg-amber-50 text-amber-700 border-amber-200',
        maintenance: 'bg-purple-50 text-purple-700 border-purple-200',
        suspended: 'bg-red-50 text-red-700 border-red-200',
        error: 'bg-red-50 text-red-700 border-red-200',
        stopped: 'bg-slate-100 text-slate-600 border-slate-200',
        offline: 'bg-slate-100 text-slate-600 border-slate-200',
        expired: 'bg-red-50 text-red-700 border-red-200',
        not_configured: 'bg-slate-100 text-slate-500 border-slate-200',
        inactive: 'bg-slate-100 text-slate-500 border-slate-200',
        paused: 'bg-amber-50 text-amber-700 border-amber-200'
      };
      return colors[s] || 'bg-slate-100 text-slate-600 border-slate-200';
    }

    function getStatusDot(status) {
      if (!status) return '#94a3b8';
      const s = status.toLowerCase();
      const colors = {
        active: '#10b981', running: '#10b981', configured: '#10b981', online: '#10b981', live: '#10b981',
        development: '#3b82f6', dev: '#3b82f6',
        pending: '#f59e0b', waiting: '#f59e0b', paused: '#f59e0b',
        maintenance: '#a855f7',
        suspended: '#ef4444', error: '#ef4444', expired: '#ef4444',
        stopped: '#94a3b8', offline: '#94a3b8', not_configured: '#94a3b8', inactive: '#94a3b8'
      };
      return colors[s] || '#94a3b8';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      try { return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch { return dateStr; }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function detectRoleByEmail(email) {
      const adminEmails = ['sarah@cloudstack.io', 'admin@cloudstack.io'];
      return adminEmails.includes(email.toLowerCase()) ? 'super_admin' : 'client_user';
    }

    function getTypeIcon(type) {
      const t = (type || '').toLowerCase();
      const icons = {
        client: '<svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>',
        project: '<svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        database: '<svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>',
        domain: '<svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9-9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>'
      };
      return icons[t] || icons.project;
    }

    function getNavIcon(icon) {
      const icons = {
        dashboard: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>',
        users: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>',
        folder: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        database: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>',
        globe: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9-9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>',
        settings: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>',
      };
      return icons[icon] || '';
    }

    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1).replace(/_/g, ' ');
    }

    function safeNum(val, fallback = 0) {
      const n = parseInt(val);
      return isNaN(n) ? fallback : n;
    }

    function safeFloat(val, fallback = 0) {
      const n = parseFloat(val);
      return isNaN(n) ? fallback : n;
    }

    function getFieldValue(item, field, fallback = '-') {
      if (!item) return fallback;
      const val = item[field];
      if (val === undefined || val === null || val === '') return fallback;
      return val;
    }

    // ============================================
    // TOAST NOTIFICATIONS
    // ============================================
    function showToast(message, type = 'info') {
      const id = Date.now();
      state.toasts.push({ id, message, type });
      renderToasts();
      setTimeout(() => {
        state.toasts = state.toasts.filter(t => t.id !== id);
        renderToasts();
      }, 4000);
    }

    function renderToasts() {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.className = 'fixed bottom-6 right-6 z-[100] flex flex-col gap-2';
        document.body.appendChild(container);
      }
      const colors = {
        success: 'bg-emerald-50 border-emerald-200 text-emerald-800',
        error: 'bg-red-50 border-red-200 text-red-800',
        warning: 'bg-amber-50 border-amber-200 text-amber-800',
        info: 'bg-blue-50 border-blue-200 text-blue-800'
      };
      const icons = {
        success: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
        error: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
        warning: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>',
        info: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
      };
      container.innerHTML = state.toasts.map(t => `
        <div class="toast-enter flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg text-sm font-medium ${colors[t.type] || colors.info}" style="min-width: 280px;">
          ${icons[t.type] || icons.info}
          <span class="flex-1">${t.message}</span>
          <button onclick="this.closest('.toast-enter').remove()" class="opacity-60 hover:opacity-100 transition-opacity">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      `).join('');
    }

    // ============================================
    // SKELETON LOADING COMPONENTS
    // ============================================
    function renderSkeletonCards(count = 4) {
      return Array.from({ length: count }, () => `
        <div class="card p-6">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <div class="skeleton-text w-20 h-3 mb-4"></div>

            { id: '/domains', icon: 'globe', label: 'Domains' },
            { id: '/settings/profile', icon: 'settings', label: 'Settings' }

        : [

            { id: '/projects', icon: 'folder', label: 'My Projects' },
            { id: '/domains', icon: 'globe', label: 'Domains' },

            { id: '/settings/profile', icon: 'settings', label: 'Settings' }

          ${getNavIcon(item.icon)}<span>${item.label}</span>
        </button>
      `).join('');

    // ============================================
    // PAGE ROUTER
    // ============================================
    function renderCurrentPage() {
      if (state.loading && !state.data) return renderLoadingState();
      const route = state.route;
      const params = state.routeParams;
      const isSuperAdmin = state.currentRole === 'super_admin';

      if (route === '/') return isSuperAdmin ? renderAdminDashboard() : renderClientDashboard();
      if (route === '/clients') return renderClientsPage();
      if (route === '/projects') return renderProjectsPage();
      if (route === '/databases') return renderDatabasesPage();
      if (route === '/domains') return renderDomainsPage();
      if (params[0] === 'clients' && params[1]) return renderClientDetailPage(params[1]);
      if (params[0] === 'projects' && params[1]) return renderProjectDetailPage(params[1]);
      if (params[0] === 'databases' && params[1]) return renderDatabaseDetailPage(params[1]);
      if (params[0] === 'domains' && params[1] === 'manage' && params[2]) return renderManageDNSPage(params[2]);
      if (params[0] === 'settings') return renderSettingsPage(params[1] || 'profile');
      return renderAdminDashboard();
    }

    // ============================================
    // DATABASE DETAIL
    // ============================================
    function renderDatabaseDetailPage(dbId) {
      const db = findItem('databases', dbId);

      const maxSize = getFieldValue(db, 'maxStorage', '100 GB');
      const sizeNum = safeFloat(size);
      const maxNum = safeFloat(maxSize) || 1;
      const sizePct = Math.min((sizeNum / maxNum) * 100, 100);
      const connPct = Math.min((safeNum(getFieldValue(db, 'connections')) / safeNum(getFieldValue(db, 'maxConnections'), 500)) * 100, 100);
      const fields = Object.entries(db).filter(([key]) => !['id', 'name', 'type', 'status', 'size', 'maxStorage', 'connections', 'maxConnections', 'projectId'].includes(key));

      return `
        ${renderBreadcrumbs([{ label: 'Databases', path: '/databases' }, { label: getFieldValue(db, 'name') }])}
        <div class="animate-fade-in-up">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-8">

              <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg></div>

                  <h1 class="text-2xl font-bold tracking-tight text-slate-900">${getFieldValue(db, 'name')}</h1>
                  ${renderStatusBadge(getFieldValue(db, 'status'))}
                </div>
                <p class="text-sm text-slate-500 mt-1">${getFieldValue(db, 'type')} ${getFieldValue(db, 'version') ? '• ' + getFieldValue(db, 'version') : ''} ${getFieldValue(db, 'region') ? '• ' + getFieldValue(db, 'region') : ''}</p>
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="fetchAPI()" class="px-4 py-2.5 btn-secondary font-medium rounded-xl text-sm">Refresh</button>
            </div>
          </div>

              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Storage Used</p>
              <p class="text-3xl font-bold text-slate-900">${size}</p>
              <p class="text-sm text-slate-400 mt-1">of ${maxSize}</p>

            </div>

            <div class="card p-6">
              <h2 class="text-base font-semibold text-slate-900 mb-4">Database Details</h2>

                ${fields.map(([key, value]) => `
                  <div><p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${capitalize(key)}</p><p class="text-sm font-medium text-slate-900 mt-1">${value || '-'}</p></div>

    // ============================================
    // DNS MANAGEMENT PAGE
    // ============================================
    function renderManageDNSPage(domainName) {

      const records = getFieldValue(domain, 'records', []);
      const nameservers = getFieldValue(domain, 'nameservers', ['ns1.cloudstack.io', 'ns2.cloudstack.io']);
      const fields = Object.entries(domain).filter(([key]) => !['id', 'domain', 'name', 'status', 'ssl', 'dnsStatus', 'expiryDate', 'sslExpiry', 'createdAt', 'records', 'nameservers', 'autoRenew', 'projectId'].includes(key));

      return `
        ${renderBreadcrumbs([{ label: 'Domains', path: '/domains' }, { label: getFieldValue(domain, 'domain', getFieldValue(domain, 'name')) }, { label: 'Manage DNS' }])}

          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-8">
            <div>
              <h1 class="text-2xl font-bold tracking-tight text-slate-900">DNS Management</h1>
              <p class="text-sm text-slate-500 mt-1">${getFieldValue(domain, 'domain', getFieldValue(domain, 'name'))}</p>
            </div>
            <button onclick="fetchAPI()" class="inline-flex items-center gap-2 px-4 py-2.5 btn-secondary font-medium rounded-xl text-sm">
              <svg class="w-4 h-4 ${state.loading ? 'animate-spin' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Refresh
            </button>
          </div>

          ${fields.length > 0 ? `
            <div class="card p-6 mb-6">
              <h2 class="text-base font-semibold text-slate-900 mb-4">Domain Details</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${fields.map(([key, value]) => `
                  <div><p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${capitalize(key)}</p><p class="text-sm font-medium text-slate-900 mt-1">${value || '-'}</p></div>
                `).join('')}
              </div>
            </div>
          ` : ''}

          ${records.length > 0 ? `
            <div class="card overflow-hidden mb-6">
              <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-base font-semibold text-slate-900">DNS Records</h2>
                <span class="text-xs text-slate-500">${records.length} records</span>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead>
                    <tr class="bg-slate-50/80">
                      ${['Type', 'Name', 'Value', 'TTL', 'Status'].map(h => `<th class="text-left py-3 px-6 font-semibold text-slate-600 text-[11px] uppercase tracking-wider">${h}</th>`).join('')}
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100">
                    ${records.map(r => `
                      <tr class="table-row">
                        <td class="py-3 px-6"><span class="font-mono font-bold text-slate-900 text-xs bg-slate-100 px-2 py-0.5 rounded">${getFieldValue(r, 'type')}</span></td>
                        <td class="py-3 px-6 font-mono text-slate-900 text-xs">${getFieldValue(r, 'name')}</td>
                        <td class="py-3 px-6 font-mono text-slate-600 text-xs truncate max-w-[200px]">${getFieldValue(r, 'value')}</td>
                        <td class="py-3 px-6 text-slate-500 text-xs">${getFieldValue(r, 'ttl')}s</td>
                        <td class="py-3 px-6">${renderStatusBadge(getFieldValue(r, 'status'))}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          ` : ''}

          <div class="card p-6">
            <h2 class="text-base font-semibold text-slate-900 mb-3">Nameservers</h2>
            <div class="space-y-2">
              ${(Array.isArray(nameservers) ? nameservers : ['ns1.cloudstack.io', 'ns2.cloudstack.io']).map(ns => `
                <code class="block text-sm text-slate-600 font-mono bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">${ns}</code>
              `).join('')}
            </div>
            <div class="mt-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
              <div class="flex gap-3">
                <svg class="w-5 h-5 text-slate-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

              </div>
            </div>
          </div>
        </div>

          </div>`;
        case 'billing': return `
          <div class="space-y-6">
            <div class="card p-6">
              <h2 class="text-base font-semibold text-slate-900 mb-5">Current Plan</h2>
              <div class="flex items-center justify-between p-5 bg-slate-50 rounded-xl border border-slate-200">
                <div><p class="text-lg font-bold text-slate-900">Professional</p><p class="text-sm text-slate-500 mt-1">$99/month • Billed monthly</p></div>
                <button class="px-4 py-2 btn-primary font-medium rounded-xl text-sm">Upgrade Plan</button>
              </div>
            </div>
            <div class="card p-6">
              <h2 class="text-base font-semibold text-slate-900 mb-4">Data Usage</h2>
              <div class="text-center py-6">
                <p class="text-4xl font-bold text-slate-900">${state.data ? JSON.stringify(state.data).length : 0}</p>
                <p class="text-sm text-slate-500 mt-1">bytes of API data received</p>
              </div>
            </div>
          </div>`;
        default: return '';
      }
    }

    // ============================================
    // MODALS
    // ============================================
    function renderModals() {
      if (!state.activeModal) return '';
      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeModal(event)">
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg animate-scale-in" onclick="event.stopPropagation()">
            ${state.activeModal === 'add-client' ? renderAddClientModal() : ''}
          </div>
        </div>
      `;
    }

    function renderAddClientModal() {
      return `
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">Add New Client</h2>
          <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors"><svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); showToast('Client created (demo only - data comes from API)', 'info');">
          <div class="space-y-1.5"><label class="block text-sm font-medium text-slate-700">Company Name *</label><input type="text" required class="w-full px-4 py-2.5 input-field text-sm" placeholder="Enter company name"></div>
          <div class="space-y-1.5"><label class="block text-sm font-medium text-slate-700">Email Address *</label><input type="email" required class="w-full px-4 py-2.5 input-field text-sm" placeholder="admin@company.com"></div>
          <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
            <button type="button" onclick="closeModal()" class="px-5 py-2.5 btn-secondary font-medium rounded-xl text-sm">Cancel</button>
            <button type="submit" class="px-5 py-2.5 btn-primary font-medium rounded-xl text-sm">Create Client</button>
          </div>
        </form>
      `;
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================
    function initLoginEvents() {
      const form = document.getElementById('loginForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const btn = document.getElementById('loginBtn');
          const spinner = document.getElementById('login-spinner');
          btn.disabled = true;
          spinner.classList.remove('hidden');
          const email = document.getElementById('loginEmail').value;
          setTimeout(() => {
            performLogin(detectRoleByEmail(email));
            btn.disabled = false;
            spinner.classList.add('hidden');
          }, 600);
        });
      }
    }

    function quickLogin(email) {
      performLogin(detectRoleByEmail(email));
    }

    async function performLogin(role) {
      state.currentView = 'dashboard';
      state.currentRole = role;
      const { path, params } = parseRoute(getRoute());
      state.route = path || '/';
      state.routeParams = params;
      render();
      await fetchAPI();
    }

    function initDashboardInteractions() {}

    function logout() {
      state.currentView = 'login';
      state.currentRole = null;
      state.route = '';
      state.routeParams = {};
      state.data = null;
      state.loading = false;
      state.error = null;
      state.notificationsOpen = false;
      state.mobileSidebarOpen = false;
      state.activeModal = null;
      window.location.hash = '';
      render();
    }

    function toggleMobileSidebar() {
      state.mobileSidebarOpen = !state.mobileSidebarOpen;
      render();
    }

    function toggleNotifications() {
      state.notificationsOpen = !state.notificationsOpen;
      render();
    }

    function openModal(modalType, itemId = null) {
      state.activeModal = modalType;
      state.selectedItem = itemId;
      render();
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      state.activeModal = null;
      state.selectedItem = null;
      render();
    }

    document.addEventListener('click', (e) => {
      if (state.notificationsOpen && !e.target.closest('.relative')) {
        state.notificationsOpen = false;
        if (state.currentView === 'dashboard') render();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.activeModal) closeModal();
        if (state.mobileSidebarOpen) { state.mobileSidebarOpen = false; render(); }
      }
    });

    // ============================================
    // INITIAL RENDER
    // ============================================
    render();
  </script>
</body>
</html>
