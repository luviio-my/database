<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuvCloud - Infrastructure Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
      color: #0f172a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Liquid Glass Effects */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(0, 0, 0, 0.02);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      box-shadow: 
        0 10px 40px -10px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.03);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.85);
      transform: translateY(-2px);
      box-shadow: 
        0 20px 50px -12px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04);
    }

    .glass-sidebar {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-right: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.04);
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    .glass-input {
      background: rgba(248, 250, 252, 0.6);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(226, 232, 240, 0.8);
      transition: all 0.25s ease;
      border-radius: 14px;
    }

    .glass-input:focus {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(15, 23, 42, 0.3);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05), 0 0 20px rgba(0,0,0,0.03);
      outline: none;
    }

    .glass-btn-primary {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 4px 16px -2px rgba(15, 23, 42, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-btn-primary:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 
        0 8px 24px -4px rgba(15, 23, 42, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .glass-btn-secondary {
      background: rgba(255, 255, 255, 0.8);
      color: #0f172a;
      border: 1px solid rgba(226, 232, 240, 0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.25s ease;
    }

    .glass-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(203, 213, 225, 0.8);
      transform: translateY(-1px);
    }

    .glass-table {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      overflow: hidden;
    }

    .table-row-glass {
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(241, 245, 249, 0.5);
    }

    .table-row-glass:hover {
      background: rgba(248, 250, 252, 0.6);
      backdrop-filter: blur(8px);
    }

    .status-dot {
      position: relative;
    }

    .status-dot::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      animation: pulse-ring 2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(2); opacity: 0; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.6); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-scale-in { animation: scaleIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-gradient { 
      background-size: 200% 200%;
      animation: gradientShift 8s ease infinite; 
    }

    .stagger-1 { animation-delay: 0.05s; opacity: 0; }
    .stagger-2 { animation-delay: 0.1s; opacity: 0; }
    .stagger-3 { animation-delay: 0.15s; opacity: 0; }
    .stagger-4 { animation-delay: 0.2s; opacity: 0; }
    .stagger-5 { animation-delay: 0.25s; opacity: 0; }
    .stagger-6 { animation-delay: 0.3s; opacity: 0; }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, 
        rgba(241, 245, 249, 0.8) 25%, 
        rgba(226, 232, 240, 0.9) 50%, 
        rgba(241, 245, 249, 0.8) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 10px;
    }

    .skeleton-text {
      background: linear-gradient(90deg, 
        rgba(241, 245, 249, 0.8) 25%, 
        rgba(226, 232, 240, 0.9) 50%, 
        rgba(241, 245, 249, 0.8) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 14px;
    }

    /* Nav Item Active State */
    .nav-item {
      position: relative;
      transition: all 0.25s ease;
      border-left: 3px solid transparent;
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.08), transparent);
      border-left-color: #0f172a;
      color: #0f172a;
      font-weight: 600;
    }

    .nav-item:not(.active):hover {
      background: rgba(248, 250, 252, 0.8);
      color: #334155;
    }

    /* Modal Backdrop */
    .modal-backdrop {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
    }

    /* Progress Bar */
    .progress-bar {
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(90deg, #0f172a, #334155);
    }

    /* Toast Notifications */
    .toast-enter {
      animation: fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hero Gradient Text */
    .hero-gradient-text {
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 50%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Feature Card Hover */
    .feature-card {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .feature-card:hover {
      transform: translateY(-8px) scale(1.02);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Icon Container */
    .icon-box {
      background: linear-gradient(135deg, rgba(248, 250, 252, 0.9), rgba(241, 245, 249, 0.9));
      border: 1px solid rgba(226, 232, 240, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Landing Page Specific */
    .hero-bg {
      background: linear-gradient(135deg, 
        rgba(99, 102, 241, 0.05) 0%, 
        rgba(168, 85, 247, 0.05) 50%, 
        rgba(236, 72, 153, 0.05) 100%);
    }

    .pricing-popular {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
      border: 2px solid rgba(99, 102, 241, 0.3);
    }
  </style>
</head>

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    function getData(key) {
      return state.data[key] || [];
    }

    function findItem(key, id) {
      return getData(key).find(item => String(item.id) === String(id));
    }

    function getUser() {
      return state.user || { name: 'User', email: '', role: 'client_user', company: '' };
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1).replace(/_/g, ' ');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      try { return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch { return dateStr; }
    }

    function getFieldValue(item, field, fallback = '-') {
      if (!item) return fallback;
      const val = item[field];
      if (val === undefined || val === null || val === '') return fallback;
      return val;
    }

    function safeNum(val, fallback = 0) {
      const n = parseInt(val);
      return isNaN(n) ? fallback : n;
    }

    function safeFloat(val, fallback = 0) {
      const n = parseFloat(val);
      return isNaN(n) ? fallback : n;
    }

    function detectRoleByEmail(email) {
      const adminEmails = ['admin@luvcloud.io', 'sarah@luvcloud.io'];
      return adminEmails.includes(email.toLowerCase()) ? 'super_admin' : 'client_user';
    }

    function getStatusColor(status) {
      if (!status) return 'bg-slate-100/80 text-slate-600 border-slate-300/50';
      const s = status.toLowerCase();
      const colors = {
        active: 'bg-emerald-50/80 text-emerald-700 border-emerald-300/60',
        running: 'bg-emerald-50/80 text-emerald-700 border-emerald-300/60',
        configured: 'bg-emerald-50/80 text-emerald-700 border-emerald-300/60',
        online: 'bg-emerald-50/80 text-emerald-700 border-emerald-300/60',
        live: 'bg-emerald-50/80 text-emerald-700 border-emerald-300/60',
        development: 'bg-blue-50/80 text-blue-700 border-blue-300/60',
        dev: 'bg-blue-50/80 text-blue-700 border-blue-300/60',
        pending: 'bg-amber-50/80 text-amber-700 border-amber-300/60',
        waiting: 'bg-amber-50/80 text-amber-700 border-amber-300/60',
        maintenance: 'bg-purple-50/80 text-purple-700 border-purple-300/60',
        suspended: 'bg-red-50/80 text-red-700 border-red-300/60',
        error: 'bg-red-50/80 text-red-700 border-red-300/60',
        stopped: 'bg-slate-100/80 text-slate-500 border-slate-300/50',
        offline: 'bg-slate-100/80 text-slate-500 border-slate-300/50'
      };
      return colors[s] || 'bg-slate-100/80 text-slate-600 border-slate-300/50';
    }

    function getStatusDotColor(status) {
      if (!status) return '#94a3b8';
      const s = status.toLowerCase();
      const colors = {
        active: '#10b981', running: '#10b981', configured: '#10b981', online: '#10b981', live: '#10b981',
        development: '#3b82f6', dev: '#3b82f6',
        pending: '#f59e0b', waiting: '#f59e0b',
        maintenance: '#a855f7',
        suspended: '#ef4444', error: '#ef4444',
        stopped: '#94a3b8', offline: '#94a3b8'
      };
      return colors[s] || '#94a3b8';
    }

    // ============================================
    // ROUTER
    // ============================================
    function navigate(path) {
      window.location.hash = path;
    }

    function getRoute() {
      return window.location.hash.slice(1) || '/';
    }

    function parseRoute(route) {
      const parts = route.split('/').filter(Boolean);
      return { path: '/' + parts.join('/'), params: parts };
    }

    window.addEventListener('hashchange', () => {
      const { path, params } = parseRoute(getRoute());
      state.route = path;
      state.routeParams = params;
      state.mobileSidebarOpen = false;
      if (state.currentView === 'dashboard') render();
    });

    // ============================================
    // API LAYER
    // ============================================
    async function fetchAllData() {
      state.loading = true;
      state.error = null;
      render();

      try {
        const [clientsRes, projectsRes, databasesRes, domainsRes, settingsRes] = await Promise.allSettled([
          fetch(`${API_BASE}/clients`),
          fetch(`${API_BASE}/projects`),
          fetch(`${API_BASE}/databases`),
          fetch(`${API_BASE}/domains`),
          fetch(`${API_BASE}/settings`)
        ]);

        const clients = clientsRes.status === 'fulfilled' && clientsRes.value.ok ? await clientsRes.value.json() : [];
        const projects = projectsRes.status === 'fulfilled' && projectsRes.value.ok ? await projectsRes.value.json() : [];
        const databases = databasesRes.status === 'fulfilled' && databasesRes.value.ok ? await databasesRes.value.json() : [];
        const domains = domainsRes.status === 'fulfilled' && domainsRes.value.ok ? await domainsRes.value.json() : [];
        const settings = settingsRes.status === 'fulfilled' && settingsRes.value.ok ? await settingsRes.value.json() : {};

        state.data = {
          clients: Array.isArray(clients) ? clients : [],
          projects: Array.isArray(projects) ? projects : [],
          databases: Array.isArray(databases) ? databases : [],
          domains: Array.isArray(domains) ? domains : [],
          settings: settings || {}
        };

        state.loading = false;
        render();
        showToast('Data synchronized successfully', 'success');
      } catch (err) {
        state.loading = false;
        state.error = err.message;
        render();
        showToast('Failed to sync data: ' + err.message, 'error');
      }
    }

    // ============================================
    // TOAST SYSTEM
    // ============================================
    function showToast(message, type = 'info') {
      const id = Date.now();
      state.toasts.push({ id, message, type });
      renderToasts();
      setTimeout(() => {
        state.toasts = state.toasts.filter(t => t.id !== id);
        renderToasts();
      }, 4000);
    }

    function renderToasts() {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.className = 'fixed bottom-6 right-6 z-[100] flex flex-col gap-3 max-w-sm';
        document.body.appendChild(container);
      }

      const styles = {
        success: 'bg-white/95 border-emerald-200 text-emerald-900 shadow-lg shadow-emerald-900/10',
        error: 'bg-white/95 border-red-200 text-red-900 shadow-lg shadow-red-900/10',
        warning: 'bg-white/95 border-amber-200 text-amber-900 shadow-lg shadow-amber-900/10',
        info: 'bg-white/95 border-blue-200 text-blue-900 shadow-lg shadow-blue-900/10'
      };

      const iconColors = {
        success: 'text-emerald-600',
        error: 'text-red-600',
        warning: 'text-amber-600',
        info: 'text-blue-600'
      };

      container.innerHTML = state.toasts.map(t => `
        <div class="toast-enter flex items-center gap-3 px-5 py-4 rounded-2xl border ${styles[t.type]} backdrop-blur-xl">
          <span class="${iconColors[t.type]}">${Icons[t.type === 'warning' ? 'alertCircle' : t.type === 'success' ? 'check' : t.type === 'error' ? 'close' : 'info']}</span>
          <span class="flex-1 text-sm font-medium">${t.message}</span>
          <button onclick="this.parentElement.remove()" class="opacity-40 hover:opacity-70 transition-opacity p-1">
            ${Icons.close}
          </button>
        </div>
      `).join('');
    }

    function renderCurrentPage() {
      if (state.loading && !state.data.clients.length) return renderLoadingState();
      const params = state.routeParams;
      const isSuperAdmin = state.currentRole === 'super_admin';

      if (state.route === '/') return isSuperAdmin ? renderAdminDashboard() : renderClientDashboard();
      if (state.route === '/clients') return renderClientsPage();
      if (state.route === '/projects') return renderProjectsPage();
      if (state.route === '/databases') return renderDatabasesPage();
      if (state.route === '/domains') return renderDomainsPage();
      if (params[0] === 'clients' && params[1]) return renderClientDetail(params[1]);
      if (params[0] === 'projects' && params[1]) return renderProjectDetail(params[1]);
      if (params[0] === 'databases' && params[1]) return renderDatabaseDetail(params[1]);
      if (params[0] === 'domains' && params[1] === 'manage' && params[2]) return renderDNSManage(params[2]);
      if (params[0] === 'settings') return renderSettingsPage(params[1] || 'profile');
      return renderAdminDashboard();
    }

                      <input type="text" value="${state.currentRole === 'super_admin' ? 'Super Administrator' : 'Client User'}" disabled class="w-full px-4 py-3 glass-input text-sm font-medium bg-slate-50/80 text-slate-500">
                    </div>
                    <div class="space-y-2">
                      <label class="block text-sm font-bold text-slate-700">Timezone</label>
                      <select class="w-full px-4 py-3 glass-input text-sm font-medium bg-white">
                        <option>UTC-8 (Pacific Time)</option>
                        <option>UTC-5 (Eastern Time)</option>
                        <option selected>UTC+0 (GMT)</option>
                        <option>UTC+1 (Central European)</option>
                      </select>
                    </div>
                  </div>
                  
                  <div class="flex justify-end mt-8 pt-6 border-t border-white/40">
                    <button class="glass-btn-primary px-6 py-3 rounded-xl font-semibold text-sm">Save Changes</button>
                  </div>
                </div>
              ` : ''}
              
              ${active === 'api-keys' ? `
                <div class="glass-card p-8">
                  <h2 class="text-lg font-bold text-slate-900 mb-6">API Configuration</h2>
                  
                  <div class="space-y-5">
                    <div class="space-y-2">
                      <label class="block text-sm font-bold text-slate-700">Base URL</label>
                      <div class="flex gap-2">
                        <input type="text" value="${API_BASE}" readonly class="flex-1 px-4 py-3 glass-input text-sm font-mono bg-slate-50/80 text-slate-600">
                        <button onclick="navigator.clipboard.writeText('${API_BASE}'); showToast('Copied!', 'success')" class="glass-btn-secondary px-4 py-3 rounded-xl text-sm font-semibold inline-flex items-center gap-2">
                          <span class="w-4 h-4">${Icons.copy}</span> Copy
                        </button>
                      </div>
                    </div>
                    
                    <div class="space-y-2">
                      <label class="block text-sm font-bold text-slate-700">Raw Response</label>
                      <div class="bg-slate-900 rounded-2xl p-5 max-h-80 overflow-auto border border-slate-800 shadow-inner">
                        <pre class="text-xs text-emerald-400 font-mono whitespace-pre-wrap leading-relaxed">${state.data ? JSON.stringify(state.data, null, 2).slice(0, 3000) : 'No data loaded.'}</pre>
                      </div>
                    </div>
                  </div>
                  
                  <div class="mt-6 p-5 bg-amber-50/80 rounded-2xl border border-amber-200/60 backdrop-blur-sm">
                    <div class="flex gap-3">
                      <span class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5">${Icons.warning}</span>
                      <div>
                        <p class="text-sm font-bold text-amber-900">API Endpoint</p>
                        <p class="text-sm text-amber-700/80 mt-1 font-medium">All data is fetched from <code class="bg-amber-100/60 px-1.5 py-0.5 rounded font-mono text-xs">${API_BASE}</code></p>
                      </div>
                    </div>
                  </div>
                </div>
              ` : ''}
              
              ${active === 'security' ? `
                <div class="glass-card p-8">
                  <h2 class="text-lg font-bold text-slate-900 mb-6">Security Options</h2>
                  <div class="space-y-4">
                    ${[
                      { title: 'Two-Factor Authentication', desc: 'Add extra security layer', btn: 'Enable', icon: Icons.shield },
                      { title: 'Change Password', desc: 'Update regularly', btn: 'Update', icon: Icons.shield },
                      { title: 'Active Sessions', desc: 'Manage logged devices', btn: 'View', icon: Icons.activity }
                    ].map(item => `
                      <div class="flex items-center justify-between p-5 bg-white/50 rounded-2xl border border-white/60">
                        <div class="flex items-center gap-4">
                          <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600">
                            <span class="w-5 h-5">${item.icon}</span>
                          </div>
                          <div>
                            <p class="font-bold text-slate-900 text-sm">${item.title}</p>
                            <p class="text-sm text-slate-500 font-medium mt-0.5">${item.desc}</p>
                          </div>
                        </div>
                        <button class="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-semibold">${item.btn}</button>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ============================================
    // MODALS
    // ============================================
    function renderModals() {
      if (!state.activeModal) return '';
      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeModal(event)">
          <div class="glass-card w-full max-w-lg animate-scale-in shadow-2xl" onclick="event.stopPropagation()">
            ${state.activeModal === 'add-client' ? renderAddClientModal() : ''}
          </div>
        </div>
      `;
    }

    function renderAddClientModal() {
      return `
        <div class="p-6 border-b border-white/40 flex items-center justify-between">
          <h2 class="text-xl font-bold text-slate-900">Add New Client</h2>
          <button onclick="closeModal()" class="p-2 hover:bg-white/60 rounded-xl transition-colors">
            <span class="w-5 h-5 text-slate-400">${Icons.close}</span>
          </button>
        </div>
        <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); showToast('Demo only - data comes from API', 'info');">
          <div class="space-y-2">
            <label class="block text-sm font-bold text-slate-700">Company Name *</label>
            <input type="text" required class="w-full px-4 py-3 glass-input text-sm" placeholder="Enter company name">
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-slate-700">Email Address *</label>
            <input type="email" required class="w-full px-4 py-3 glass-input text-sm" placeholder="admin@company.com">
          </div>
          <div class="flex justify-end gap-3 pt-6 border-t border-white/40">
            <button type="button" onclick="closeModal()" class="glass-btn-secondary px-5 py-2.5 rounded-xl font-semibold text-sm">Cancel</button>
            <button type="submit" class="glass-btn-primary px-5 py-2.5 rounded-xl font-semibold text-sm">Create Client</button>
          </div>
        </form>
      `;
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================
    function initLandingEvents() {}

    function initLoginEvents() {
      const form = document.getElementById('loginForm');
      if (form) {
        form.addEventListener('submit', async function(e) {
          e.preventDefault();

          const emailInput = document.getElementById('loginEmail');
          const passwordInput = document.getElementById('loginPassword');
          const btn = document.getElementById('loginBtn');
          const spinner = document.getElementById('loginSpinner');
          const errorDiv = document.getElementById('loginError');
          const errorMessage = document.getElementById('loginErrorMessage');

          const email = emailInput.value.trim();
          const password = passwordInput.value;

          // Reset error state
          errorDiv.classList.add('hidden');

          // Validate inputs
          if (!email || !password) {
            errorDiv.classList.remove('hidden');
            errorMessage.textContent = 'Please enter both email and password.';
            return;
          }

          btn.disabled = true;
          spinner.classList.remove('hidden');

          try {
            // REAL API LOGIN CALL
            const response = await fetch(`${API_BASE}/login`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: email,
                password: password
              })
            });

            const data = await response.json();

            if (data.success && data.user) {
              // Store user data in localStorage
              localStorage.setItem('luvcloud_user', JSON.stringify(data.user));
              localStorage.setItem('luvcloud_token', data.token || '');
              
              // Set user state
              state.user = data.user;
              state.currentRole = detectRoleByEmail(email);
              
              showToast(`Welcome back, ${data.user.name || email}!`, 'success');
              
              // Navigate to dashboard
              state.currentView = 'dashboard';
              const { path, params } = parseRoute(getRoute());
              state.route = path;
              state.routeParams = params;
              render();
              
              // Fetch all data after login
              await fetchAllData();
            } else {
              // Show error message from API
              errorDiv.classList.remove('hidden');
              errorMessage.textContent = data.message || 'Invalid email or password.';
              showToast(data.message || 'Login failed', 'error');
            }
          } catch (error) {
            console.error('Login error:', error);
            errorDiv.classList.remove('hidden');
            errorMessage.textContent = 'Connection error. Please try again.';
            showToast('Connection error. Please try again later.', 'error');
          } finally {
            btn.disabled = false;
            spinner.classList.add('hidden');
          }
        });
      }
    }

    function initDashboardEvents() {}

    function quickLogin(email) {
      // For demo purposes, simulate a successful login
      const role = detectRoleByEmail(email);
      const mockUser = {
        id: role === 'super_admin' ? 1 : 2,
        name: role === 'super_admin' ? 'Sarah Chen' : 'Michael Torres',
        email: email,
        role: role,
        company: role === 'super_admin' ? 'LuvCloud' : 'Acme Corp'
      };

      localStorage.setItem('luvcloud_user', JSON.stringify(mockUser));
      state.user = mockUser;
      state.currentRole = role;

      performLogin(role);
    }

    async function performLogin(role) {
      state.currentView = 'dashboard';
      state.currentRole = role;
      const { path, params } = parseRoute(getRoute());
      state.route = path;
      state.routeParams = params;
      render();
      await fetchAllData();
    }

    function logout() {
      // Clear stored data
      localStorage.removeItem('luvcloud_user');
      localStorage.removeItem('luvcloud_token');
      
      state.currentView = 'landing';
      state.currentRole = null;
      state.user = null;
      state.route = '/';
      state.routeParams = {};
      state.data = { clients: [], projects: [], databases: [], domains: [], settings: {} };
      state.loading = false;
      state.error = null;
      window.location.hash = '';
      render();
      showToast('You have been logged out', 'info');
    }

    function toggleMobileSidebar() {
      state.mobileSidebarOpen = !state.mobileSidebarOpen;
      render();
    }

    function openModal(type) {
      state.activeModal = type;
      render();
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      state.activeModal = null;
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.activeModal) closeModal();
        if (state.mobileSidebarOpen) { state.mobileSidebarOpen = false; render(); }
      }
    });

    // Check for existing session on load
    function checkExistingSession() {
      const savedUser = localStorage.getItem('luvcloud_user');
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          state.user = userData;
          state.currentRole = detectRoleByEmail(userData.email);
          state.currentView = 'dashboard';
          
          const { path, params } = parseRoute(getRoute());
          state.route = path;
          state.routeParams = params;
        } catch (e) {
          console.error('Failed to parse saved user:', e);
        }
      }
    }

    // Initialize
    checkExistingSession();
    render();
  </script>
</body>
</html>
